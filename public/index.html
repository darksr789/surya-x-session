<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURYA-X | DARK SURYA OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #050505;
            color: #00ffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            overflow-x: hidden;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0,255,255,0.1) 0%, rgba(0,0,0,1) 80%);
        }
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #00ffff;
            box-shadow: 0 0 30px #00ffff;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px #00ffff; }
            50% { transform: scale(1.05); box-shadow: 0 0 40px #00ffff; }
            100% { transform: scale(1); box-shadow: 0 0 20px #00ffff; }
        }
        h1 { font-size: 3rem; text-shadow: 2px 2px #ff00ff; letter-spacing: 5px; margin: 10px 0; }
        p { color: #888; letter-spacing: 2px; font-size: 0.9rem; }
        .btn-container { display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 15px 35px;
            border: 2px solid #00ffff;
            background: transparent;
            color: #00ffff;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 25px #00ffff;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://files.catbox.moe/jbrn0i.jpg" class="logo">
        <h1>SURYA-X</h1>
        <p>THE NEXT GENERATION WHATSAPP BOT SYSTEM</p>
        <div class="btn-container">
            <a href="/qr" class="btn"><i class="fas fa-qrcode"></i> QR Code</a>
            <a href="/pair" class="btn"><i class="fas fa-key"></i> Pairing Code</a>
        </div>
    </div>
</body>
</html>
