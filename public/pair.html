<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURYA-X | Pairing Code</title>
    <style>
        body { background: #080808; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: rgba(0,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #00ffff; text-align: center; width: 350px; }
        h2 { color: #00ffff; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #00ffff; color: white; border-radius: 8px; text-align: center; }
        .btn { background: #00ffff; color: black; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        #result { margin-top: 20px; font-size: 2rem; font-weight: bold; color: #ff00ff; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PAIRING CODE</h2>
        <input type="number" id="number" placeholder="Enter Number (e.g. 917797...)">
        <button class="btn" onclick="getCode()">GENERATE CODE</button>
        <div id="result"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script>
        async function getCode() {
            const num = document.getElementById('number').value;
            const resDiv = document.getElementById('result');
            if(!num) return alert("Enter number!");
            resDiv.innerText = "WAITING...";
            try {
                const { data } = await axios.get('/pair-logic?number=' + num);
                resDiv.innerText = data.code || "Error";
            } catch (e) { resDiv.innerText = "ERROR"; }
        }
    </script>
</body>
</html>
